name: Jason Duval
role: GTA VI protagonist
photo: /images/team/jason-duval/photo.jpg
bio: >-
  Jason Duval is a main protagonist in GTA VI, operating alongside his partner,
  Lucia, in the fictional state of Leonida. An ex-Army soldier who grew up
  around grifters, Jason now works for drug runners in the Keys. He is depicted
  as a street-smart criminal seeking a better life. He is a gritty survivalist
  caught in a cycle of high-stakes robberies. His dynamic with Lucia centers on
  a "ride or die" loyalty, testing their trust as the law closes in. Balancing
  raw muscle with tactical instincts, Jason represents the desperate, modern-day
  outlaw navigating the neon-soaked underworld of Leonida.
